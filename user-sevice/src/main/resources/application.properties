spring.application.name=user-sevice
service.port=8080

#MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/home_energy_tracker
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none

# Ensure Flyway scans the standard location and validate naming to list bad filenames if any
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-migration-naming=true

# Enable Hibernate SQL logging for debugging the generated SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
